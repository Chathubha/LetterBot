<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LetterBot - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      darkMode: ['selector', '[data-theme="dark"]'],
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>
  <style>
    [data-theme="dark"] { color-scheme: dark; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px oklch(var(--p) / 0.3); }
      50% { box-shadow: 0 0 40px oklch(var(--p) / 0.5); }
    }
    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .float-anim { animation: float 3s ease-in-out infinite; }
    .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    .gradient-bg {
      background: linear-gradient(-45deg, oklch(var(--p)), oklch(var(--s)), oklch(var(--a)), oklch(var(--p)));
      background-size: 400% 400%;
      animation: gradient-shift 15s ease infinite;
    }
    .slide-up { animation: slide-up 0.6s ease-out forwards; }
    .fade-in { animation: fade-in 0.4s ease-out forwards; }
    
    .glass {
      background: oklch(var(--b2) / 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid oklch(var(--bc) / 0.1);
    }
    
    .input-focus:focus {
      box-shadow: 0 0 0 2px oklch(var(--p) / 0.3);
    }
    
    .btn-shine {
      position: relative;
      overflow: hidden;
    }
    .btn-shine::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        to right,
        transparent 0%,
        rgba(255,255,255,0.1) 50%,
        transparent 100%
      );
      transform: rotate(45deg);
      transition: 0.5s;
      opacity: 0;
    }
    .btn-shine:hover::after {
      opacity: 1;
      left: 100%;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.4;
      pointer-events: none;
    }
  </style>
</head>
<body class="min-h-screen bg-base-100 font-sans overflow-y-auto">

  <!-- Animated Background Orbs -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden">
    <div class="orb w-96 h-96 bg-primary/30 top-[-10%] left-[-5%]" style="animation: float 8s ease-in-out infinite;"></div>
    <div class="orb w-80 h-80 bg-secondary/30 bottom-[-10%] right-[-5%]" style="animation: float 6s ease-in-out infinite 1s;"></div>
    <div class="orb w-64 h-64 bg-accent/20 top-[40%] right-[10%]" style="animation: float 7s ease-in-out infinite 2s;"></div>
  </div>

  <div class="relative min-h-screen flex items-center justify-center px-4 py-8">

    <!-- Login Card -->
    <div id="loginCard" class="w-full max-w-md slide-up">
      
      <!-- Logo -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl gradient-bg shadow-2xl pulse-glow mb-4">
          <svg class="w-10 h-10 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M22 7L12 13L2 7"/>
          </svg>
        </div>
        <h1 class="text-3xl font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">
          LetterBot
        </h1>
        <p class="text-base-content/50 text-sm mt-1">AI-Powered Letter Generator</p>
      </div>

      <!-- Card -->
      <div class="glass rounded-3xl p-8 shadow-2xl">
        
        <!-- Tabs -->
        <div class="flex mb-6 bg-base-300/50 rounded-xl p-1">
          <button id="loginTab" onclick="switchTab('login')" class="flex-1 py-2.5 px-4 rounded-lg text-sm font-semibold transition-all duration-300 bg-primary text-white shadow-lg">
            Login
          </button>
          <button id="registerTab" onclick="switchTab('register')" class="flex-1 py-2.5 px-4 rounded-lg text-sm font-semibold transition-all duration-300 text-base-content/50 hover:text-base-content">
            Register
          </button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4 fade-in">
          <div class="space-y-1.5">
            <label class="text-xs font-medium text-base-content/70 uppercase tracking-wider">Email</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-base-content/30">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
              </span>
              <input 
                id="loginEmail" 
                type="email" 
                required
                placeholder="you@example.com"
                class="input input-bordered w-full pl-10 pr-4 py-3 bg-base-300/30 border-base-300/50 focus:border-primary input-focus transition-all duration-300"
              />
            </div>
          </div>

          <div class="space-y-1.5">
            <label class="text-xs font-medium text-base-content/70 uppercase tracking-wider">Password</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-base-content/30">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              </span>
              <input 
                id="loginPassword" 
                type="password" 
                required
                placeholder="••••••••"
                class="input input-bordered w-full pl-10 pr-12 py-3 bg-base-300/30 border-base-300/50 focus:border-primary input-focus transition-all duration-300"
              />
              <button type="button" onclick="togglePassword('loginPassword', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-base-content/30 hover:text-base-content/60 transition-colors">
                <svg class="w-5 h-5 eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="w-5 h-5 eye-closed hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>

          <div id="loginError" class="hidden alert alert-error text-sm py-2"></div>

          <button type="submit" id="loginBtn" class="btn btn-primary w-full py-3 text-base font-semibold btn-shine rounded-xl transition-all duration-300 hover:shadow-lg hover:shadow-primary/30">
            <span class="btn-text">Sign In</span>
            <span class="loading loading-spinner loading-sm hidden"></span>
          </button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" onsubmit="handleRegister(event)" class="space-y-4 hidden">
          <div class="space-y-1.5">
            <label class="text-xs font-medium text-base-content/70 uppercase tracking-wider">Full Name</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-base-content/30">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </span>
              <input 
                id="registerName" 
                type="text" 
                required
                placeholder="John Doe"
                class="input input-bordered w-full pl-10 pr-4 py-3 bg-base-300/30 border-base-300/50 focus:border-primary input-focus transition-all duration-300"
              />
            </div>
          </div>

          <div class="space-y-1.5">
            <label class="text-xs font-medium text-base-content/70 uppercase tracking-wider">Email</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-base-content/30">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
              </span>
              <input 
                id="registerEmail" 
                type="email" 
                required
                placeholder="you@example.com"
                class="input input-bordered w-full pl-10 pr-4 py-3 bg-base-300/30 border-base-300/50 focus:border-primary input-focus transition-all duration-300"
              />
            </div>
          </div>

          <div class="space-y-1.5">
            <label class="text-xs font-medium text-base-content/70 uppercase tracking-wider">Password</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-base-content/30">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              </span>
              <input 
                id="registerPassword" 
                type="password" 
                required
                minlength="6"
                placeholder="Min 6 characters"
                class="input input-bordered w-full pl-10 pr-4 py-3 bg-base-300/30 border-base-300/50 focus:border-primary input-focus transition-all duration-300"
              />
            </div>
          </div>

          <div class="space-y-1.5">
            <label class="text-xs font-medium text-base-content/70 uppercase tracking-wider">Confirm Password</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-base-content/30">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              </span>
              <input 
                id="registerConfirmPassword" 
                type="password" 
                required
                minlength="6"
                placeholder="Repeat password"
                class="input input-bordered w-full pl-10 pr-4 py-3 bg-base-300/30 border-base-300/50 focus:border-primary input-focus transition-all duration-300"
              />
            </div>
          </div>

          <div id="registerError" class="hidden alert alert-error text-sm py-2"></div>
          <div id="registerSuccess" class="hidden alert alert-success text-sm py-2"></div>

          <button type="submit" id="registerBtn" class="btn btn-primary w-full py-3 text-base font-semibold btn-shine rounded-xl transition-all duration-300 hover:shadow-lg hover:shadow-primary/30">
            <span class="btn-text">Create Account</span>
            <span class="loading loading-spinner loading-sm hidden"></span>
          </button>
        </form>

        <!-- Divider -->
        <div class="flex items-center gap-3 my-6">
          <div class="flex-1 h-px bg-base-300/50"></div>
          <span class="text-xs text-base-content/40">or continue with</span>
          <div class="flex-1 h-px bg-base-300/50"></div>
        </div>

        <!-- Social Login -->
        <div class="flex gap-3">
          <button onclick="handleGoogleLogin()" class="btn btn-outline flex-1 gap-2 rounded-xl border-base-300/50 hover:bg-base-300/30 transition-all duration-300">
            <svg class="w-5 h-5" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google
          </button>
          <button onclick="handleGithubLogin()" class="btn btn-outline flex-1 gap-2 rounded-xl border-base-300/50 hover:bg-base-300/30 transition-all duration-300">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            GitHub
          </button>
        </div>
      </div>

      <!-- Footer -->
      <p class="text-center text-xs text-base-content/30 mt-6">
        By continuing, you agree to our Terms & Privacy Policy
      </p>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast toast-bottom toast-center z-50">
    <div id="toast" class="alert alert-sm text-sm hidden shadow-lg"></div>
  </div>

  <script>
    // ─── SUPABASE INIT ───
    const SUPABASE_URL = 'https://ctzugdahtkfddwcdoyjn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0enVnZGFodGtmZGR3Y2RveWpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5OTI3MDIsImV4cCI6MjA5OTU2ODcwMn0.iwAhxHe67SLu5DD51KLP75qlPUBue7KC-snP30VG8Ys';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ─── CHECK SESSION ───
    async function checkSession() {
      const { data: { session } } = await sbClient.auth.getSession();
      if (session) {
        window.location.href = '/';
      }
    }
    checkSession();

    // ─── TOAST ───
    function showToast(msg, type = 'info', duration = 3000) {
      const toast = document.getElementById('toast');
      toast.className = `alert alert-sm text-sm shadow-lg alert-${type}`;
      toast.textContent = msg;
      toast.classList.remove('hidden');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.add('hidden'), duration);
    }

    // ─── TAB SWITCHING ───
    function switchTab(tab) {
      const loginTab = document.getElementById('loginTab');
      const registerTab = document.getElementById('registerTab');
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');

      if (tab === 'login') {
        loginTab.className = 'flex-1 py-2.5 px-4 rounded-lg text-sm font-semibold transition-all duration-300 bg-primary text-white shadow-lg';
        registerTab.className = 'flex-1 py-2.5 px-4 rounded-lg text-sm font-semibold transition-all duration-300 text-base-content/50 hover:text-base-content';
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
      } else {
        registerTab.className = 'flex-1 py-2.5 px-4 rounded-lg text-sm font-semibold transition-all duration-300 bg-primary text-white shadow-lg';
        loginTab.className = 'flex-1 py-2.5 px-4 rounded-lg text-sm font-semibold transition-all duration-300 text-base-content/50 hover:text-base-content';
        registerForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
      }
    }

    // ─── TOGGLE PASSWORD ───
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const eyeOpen = btn.querySelector('.eye-open');
      const eyeClosed = btn.querySelector('.eye-closed');
      
      if (input.type === 'password') {
        input.type = 'text';
        eyeOpen.classList.add('hidden');
        eyeClosed.classList.remove('hidden');
      } else {
        input.type = 'password';
        eyeOpen.classList.remove('hidden');
        eyeClosed.classList.add('hidden');
      }
    }

    // ─── LOADING STATE ───
    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      const text = btn.querySelector('.btn-text');
      const spinner = btn.querySelector('.loading');
      
      if (loading) {
        btn.disabled = true;
        text.classList.add('hidden');
        spinner.classList.remove('hidden');
      } else {
        btn.disabled = false;
        text.classList.remove('hidden');
        spinner.classList.add('hidden');
      }
    }

    // ─── LOGIN ───
    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const errorDiv = document.getElementById('loginError');
      
      errorDiv.classList.add('hidden');
      setLoading('loginBtn', true);

      try {
        const { data, error } = await sbClient.auth.signInWithPassword({
          email,
          password
        });

        if (error) throw error;

        showToast('Login successful! Redirecting...', 'success');
        setTimeout(() => window.location.href = '/', 1000);
      } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.classList.remove('hidden');
      } finally {
        setLoading('loginBtn', false);
      }
    }

    // ─── REGISTER ───
    async function handleRegister(e) {
      e.preventDefault();
      const name = document.getElementById('registerName').value;
      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;
      const confirmPassword = document.getElementById('registerConfirmPassword').value;
      const errorDiv = document.getElementById('registerError');
      const successDiv = document.getElementById('registerSuccess');
      
      errorDiv.classList.add('hidden');
      successDiv.classList.add('hidden');

      if (password !== confirmPassword) {
        errorDiv.textContent = 'Passwords do not match';
        errorDiv.classList.remove('hidden');
        return;
      }

      setLoading('registerBtn', true);

      try {
        const { data, error } = await sbClient.auth.signUp({
          email,
          password,
          options: {
            data: { full_name: name }
          }
        });

        if (error) throw error;

        successDiv.textContent = 'Account created! Check your email for verification link.';
        successDiv.classList.remove('hidden');
        showToast('Registration successful!', 'success');
      } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.classList.remove('hidden');
      } finally {
        setLoading('registerBtn', false);
      }
    }

    // ─── GOOGLE LOGIN ───
    async function handleGoogleLogin() {
      const { error } = await sbClient.auth.signInWithOAuth({
        provider: 'google'
      });
      if (error) showToast(error.message, 'error');
    }

    // ─── GITHUB LOGIN ───
    async function handleGithubLogin() {
      const { error } = await sbClient.auth.signInWithOAuth({
        provider: 'github'
      });
      if (error) showToast(error.message, 'error');
    }
  </script>
</body>
</html>
